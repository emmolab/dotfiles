# Midnight Signal tmux theme

set -g default-terminal "screen-256color"
set -g history-limit 50000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on

# Prefix and reloading
unbind C-b
set -g prefix C-a
bind C-a send-prefix
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Split behavior keeps current path
bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'
bind c new-window -c '#{pane_current_path}'

# Colors
set -g status-style 'bg=#111827,fg=#cbd5e1'
set -g message-style 'bg=#172033,fg=#f8fafc'
set -g message-command-style 'bg=#172033,fg=#f8fafc'
set -g pane-border-style 'fg=#334155'
set -g pane-active-border-style 'fg=#67e8f9'
set -g mode-style 'bg=#2563eb,fg=#f8fafc'

set -g status-left-length 40
set -g status-right-length 120
set -g status-left '#[fg=#67e8f9,bold] #S #[fg=#64748b]|#[fg=#f8fafc] #H '
set -g status-right '#[fg=#94a3b8]#{pane_current_path} #[fg=#64748b]|#[fg=#f8fafc] %Y-%m-%d #[fg=#67e8f9]%H:%M '

setw -g window-status-format '#[fg=#94a3b8] #I:#W '
setw -g window-status-current-format '#[bg=#172033,fg=#f8fafc,bold] #I:#W '
setw -g window-status-separator ''

set -g status-justify left
set -g visual-activity off
setw -g monitor-activity off
